<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Details</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f6f8;
}

.container{
    max-width:800px;
    margin:20px auto;
    padding:20px;
    background:white;
    border-radius:10px;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:6px;
}
 .home-btn{
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:8px 12px;
    border-radius:6px;
    font-size:14px;
}

.home-btn:hover{
    background:#1e3a8a;
}   
</style>
</head>

<body>
<div style="padding:10px;">
  <a href="index.html" class="home-btn">← Back to Home</a>
</div>
<div class="container" id="jobDetail">
Loading job details...
</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const jobId = urlParams.get("id");

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE0orW_Uem5Vi736r-rSdwHKpJLmCmHh9IhVjIs2au5nnhMjhWv8Pp1X-yKHRlo-LhHuzHc9dgHPSH/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n").slice(1);
    let job = rows[jobId].split(",");

    document.getElementById("jobDetail").innerHTML = `
        <h2>${job[0]}</h2>
        <p>${job[1]}</p>
        <p><b>Date:</b> ${job[3]}</p>

        <a class="btn" href="${job[2]}" target="_blank">Apply Now</a>
        <a class="btn" href="${job[4]}" target="_blank">View PDF</a>
    `;
});

</script>

</body>
</html>
